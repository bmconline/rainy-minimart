function generateTransactions(){
  const r = rng(42);
  const out = [];
  const today = new Date(2026, 4, 23);
  const start = new Date(2026, 0, 1);
  let docIn = 1, docOut = 1;

  for (let d = new Date(start); d <= today; d.setDate(d.getDate()+1)) {
    const inCount = 3 + Math.floor(r() * 6);
    for (let i = 0; i < inCount; i++) {
      const cat = INCOME_CATEGORIES[Math.floor(r() * INCOME_CATEGORIES.length)];
      const base = cat.id === "sale-front" ? 1200 + r() * 4800
                 : cat.id === "sale-online" ? 800 + r() * 3200
                 : cat.id === "sale-whole"  ? 3500 + r() * 8500
                 : cat.id === "service"     ? 200 + r() * 600
                 : 100 + r() * 400;
      out.push({
        id: `tx-${out.length+1}`,
        type: "income",
        date: new Date(d),
        doc: `RV-${String(d.getFullYear()).slice(2)}${String(d.getMonth()+1).padStart(2,"0")}-${String(docIn++).padStart(4,"0")}`,
        item: incomeItemName(cat.id, r),
        category: cat.id,
        amount: Math.round(base / 5) * 5,
        payment: ["cash","bank","credit"][Math.floor(r() * 3)],
        user: USERS[Math.floor(r()*USERS.length)].id,
        note: r() > 0.85 ? "ลูกค้าประจำ" : ""
      });
    }
    const outCount = 1 + Math.floor(r() * 3);
    for (let i = 0; i < outCount; i++) {
      const cat = EXPENSE_CATEGORIES[Math.floor(r() * EXPENSE_CATEGORIES.length)];
      const base = cat.id === "goods"  ? 2500 + r() * 12000
                 : cat.id === "elec"   ? 1800 + r() * 1200
                 : cat.id === "water"  ? 250 + r() * 200
                 : cat.id === "wage"   ? 12000 + r() * 4000
                 : cat.id === "rent"   ? 8000 + r() * 2000
                 : cat.id === "logi"   ? 350 + r() * 800
                 : cat.id === "market" ? 500 + r() * 1500
                 : 200 + r() * 800;
      if ((cat.id === "rent" || cat.id === "wage") && d.getDate() !== 5) continue;
      if (cat.id === "elec" && d.getDate() !== 15) continue;
      if (cat.id === "water" && d.getDate() !== 12) continue;
      out.push({
        id: `tx-${out.length+1}`,
        type: "expense",
        date: new Date(d),
        doc: `PV-${String(d.getFullYear()).slice(2)}${String(d.getMonth()+1).padStart(2,"0")}-${String(docOut++).padStart(4,"0")}`,
        item: expenseItemName(cat.id, r),
        category: cat.id,
        amount: Math.round(base / 5) * 5,
        payment: ["cash","bank","credit"][Math.floor(r() * 3)],
        user: USERS[Math.floor(r()*USERS.length)].id,
        note: r() > 0.9 ? "รอใบเสร็จ" : ""
      });
    }
  }
  return out.sort((a,b) => b.date - a.date);
}

  return Number(n || 0).toLocaleString("th-TH", { minimumFractionDigits: dp, maximumFractionDigits: dp });

  if (!d) return "";

}

const { useState, useEffect, useRef, useMemo } = React;

function RainCanvas({ density = 120 }) {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let raf;
    const drops = [];
    const resize = () => {
      canvas.width = canvas.offsetWidth * devicePixelRatio;
      canvas.height = canvas.offsetHeight * devicePixelRatio;
    };
    resize();
    window.addEventListener("resize", resize);
    for (let i = 0; i < density; i++) {
      drops.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        len: 8 + Math.random() * 18,
        v: 4 + Math.random() * 8,
        a: 0.15 + Math.random() * 0.45,
      });
    }
    const tick = () => {
      ctx.clearRect(0,0,canvas.width, canvas.height);
      ctx.lineWidth = 1.2 * devicePixelRatio;
      for (const d of drops) {
        ctx.strokeStyle = `rgba(180,220,255,${d.a})`;
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x - 2, d.y + d.len);
        ctx.stroke();
        d.y += d.v * devicePixelRatio;
        d.x -= 0.6 * devicePixelRatio;
        if (d.y > canvas.height) { d.y = -d.len; d.x = Math.random() * canvas.width; }
        if (d.x < 0) d.x = canvas.width;
      }
      raf = requestAnimationFrame(tick);
    };
    tick();
    return () => { cancelAnimationFrame(raf); window.removeEventListener("resize", resize); };
  }, [density]);
  return <canvas ref={ref} className="rain-bg" />;
}

function KPI({ title, value, delta, deltaType = "up", icon: I, dark, prefix = "฿" }) {
  return (
    <div className={`card ${dark ? "dark" : ""}`}>
      <div className="card-head"><div className="card-title">{title}</div></div>

function BarsChart({ data, maxLabels = 14 }) {
  const max = Math.max(...data.flatMap(d => [d.income, d.expense]), 1);
  const step = Math.max(1, Math.ceil(data.length / maxLabels));
  return (
    <div className="bars" style={{minHeight: 260}}>
      {data.map((d, i) => (
        <div className="bar-col" key={i}>
          <div className="bars-inner">
            <div className="bar income" style={{height: `${(d.income / max) * 100}%`}} data-tip={`รายรับ ฿${fmtMoney(d.income, 0)}`} />
            <div className="bar expense" style={{height: `${(d.expense / max) * 100}%`}} data-tip={`รายจ่าย ฿${fmtMoney(d.expense, 0)}`} />
          </div>
          <div className="bar-label">{i % step === 0 ? d.label : ""}</div>
        </div>
      ))}
    </div>
  );
}

function Donut({ data, size = 160 }) {
  const total = data.reduce((s,d) => s + d.value, 0) || 1;
  const r = size / 2 - 16;
  const cx = size / 2, cy = size / 2;
  let acc = 0;
  const circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#eee" strokeWidth="20" />
      {data.map((d, i) => {
        const frac = d.value / total;
        const dash = frac * circ;
        const offset = -acc * circ;
        const node = (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth="20"
            strokeDasharray={`${dash} ${circ - dash}`} strokeDashoffset={offset}
            transform={`rotate(-90 ${cx} ${cy})`} style={{transition: "stroke-dasharray 0.6s ease-out"}} />
        );
        acc += frac;
        return node;
      })}
      <text x={cx} y={cy - 4} textAnchor="middle" fontSize="11" fill="#0B1B2B" opacity="0.6" fontFamily="IBM Plex Mono">รวม</text>
      <text x={cx} y={cy + 18} textAnchor="middle" fontSize="20" fill="#0B1B2B" fontWeight="600" fontFamily="IBM Plex Mono">฿{fmtMoney(total/1000, 1)}k</text>
    </svg>
  );
}

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function Dashboard({ txs, onNav, period, setPeriod }) {
  const today = new Date(2026, 4, 23);
  const startOf = (() => {
    if (period === "day")   return new Date(today.getFullYear(), today.getMonth(), today.getDate());
    if (period === "month") return new Date(today.getFullYear(), today.getMonth(), 1);
    return new Date(today.getFullYear(), 0, 1);
  })();
  const prevStart = (() => {
    if (period === "day")   return new Date(today.getFullYear(), today.getMonth(), today.getDate() - 1);
    if (period === "month") return new Date(today.getFullYear(), today.getMonth() - 1, 1);
    return new Date(today.getFullYear() - 1, 0, 1);
  })();
  const prevEnd = startOf;
  const inPeriod = (d, s, e) => d >= s && (!e || d < e);
  const cur = txs.filter(t => inPeriod(t.date, startOf, null));
  const prev = txs.filter(t => inPeriod(t.date, prevStart, prevEnd));
  const sumBy = (arr, k) => arr.filter(t => t.type === k).reduce((s,t) => s + t.amount, 0);
  const curIn = sumBy(cur, "income");
  const curOut = sumBy(cur, "expense");
  const prevIn = sumBy(prev, "income");
  const prevOut = sumBy(prev, "expense");
  const profit = curIn - curOut;
  const prevProfit = prevIn - prevOut;
  const pct = (a, b) => !b ? 0 : ((a - b) / b * 100);

  const barsData = useMemo(() => {
    if (period === "day") {
      const rows = [];
      for (let i = 13; i >= 0; i--) {
        const d = new Date(today); d.setDate(d.getDate() - i);
        const dayTx = txs.filter(t => sameDay(t.date, d));
        rows.push({ label: `${d.getDate()}/${d.getMonth()+1}`, income: sumBy(dayTx, "income"), expense: sumBy(dayTx, "expense") });
      }
      return rows;
    }
    if (period === "month") {
      const rows = [];
      const d0 = new Date(today.getFullYear(), today.getMonth(), 1);
      const end = today.getDate();
      for (let i = 1; i <= end; i++) {
        const d = new Date(d0.getFullYear(), d0.getMonth(), i);
        const dayTx = txs.filter(t => sameDay(t.date, d));
        rows.push({ label: `${i}`, income: sumBy(dayTx, "income"), expense: sumBy(dayTx, "expense") });
      }
      return rows;
    }
    const rows = [];
    for (let m = 0; m <= today.getMonth(); m++) {
      const mTx = txs.filter(t => t.date.getFullYear() === today.getFullYear() && t.date.getMonth() === m);
      rows.push({ label: thaiMonth(m), income: sumBy(mTx, "income"), expense: sumBy(mTx, "expense") });
    }
    return rows;
  }, [txs, period]);

  const expByCat = useMemo(() => {
    const colors = ["#0B1B2B", "#4FA8E0", "#C28840", "#2F8F5E", "#C04A3E", "#8C5BAF", "#5E7A99", "#3D9D7C"];
    const groups = {};
    cur.filter(t => t.type === "expense").forEach(t => { groups[t.category] = (groups[t.category] || 0) + t.amount; });
    return Object.entries(groups)
      .map(([k,v], i) => ({ label: catLabel(k), value: v, color: colors[i % colors.length] }))
      .sort((a,b) => b.value - a.value)
      .slice(0, 6);
  }, [cur]);

  const recent = txs.slice(0, 6);

  return (
    <div className="page-enter">
      <Topbar
        crumbs={"แดชบอร์ด · " + (period === "day" ? "วันนี้" : period === "month" ? "เดือนนี้" : "ปีนี้")}
        title="ภาพรวมร้าน">
        <div className="tab-row">
          <button className={period === "day" ? "active" : ""} onClick={() => setPeriod("day")}>วัน</button>
          <button className={period === "month" ? "active" : ""} onClick={() => setPeriod("month")}>เดือน</button>
          <button className={period === "year" ? "active" : ""} onClick={() => setPeriod("year")}>ปี</button>
        </div>
        <button className="btn" onClick={() => onNav("income")}><Icon.Plus /> รายรับ</button>
        <button className="btn solid" onClick={() => onNav("expense")}><Icon.Plus /> รายจ่าย</button>
      </Topbar>

      <div className="kpi-grid">
        <KPI title="รายรับ" value={fmtMoney(curIn, 2)} delta={`${pct(curIn,prevIn).toFixed(1)}%`}
          deltaType={curIn >= prevIn ? "up" : "down"} icon={Icon.TrendUp} />
        <KPI title="รายจ่าย" value={fmtMoney(curOut, 2)} delta={`${pct(curOut,prevOut).toFixed(1)}%`}
          deltaType={curOut <= prevOut ? "up" : "down"} icon={Icon.TrendDown} />
        <KPI dark title="กำไรเบื้องต้น" value={fmtMoney(profit, 2)} delta={`${pct(profit,prevProfit).toFixed(1)}%`}
          deltaType={profit >= prevProfit ? "up" : "down"} icon={Icon.Wallet} />
        <KPI title="จำนวนรายการ" value={cur.length} prefix="" delta={`+${cur.length - prev.length}`}
          deltaType={cur.length >= prev.length ? "up" : "down"} icon={Icon.List} />
      </div>

      <div className="chart-grid">
        <div className="card">
          <div className="chart-head">
            <div>
              <h3>รายรับ vs รายจ่าย</h3>
              <div style={{fontSize:12, color:"var(--muted)", marginTop:2}}>
                {period === "day" ? "14 วันที่ผ่านมา" : period === "month" ? `เดือน${thaiMonth(today.getMonth())} ${today.getFullYear()+543}` : `ปี ${today.getFullYear()+543}`}
              </div>
            </div>
            <div className="legend">
              <span><span className="dot" style={{background:"#4FA8E0"}}></span>รายรับ</span>
              <span><span className="dot" style={{background:"#C04A3E"}}></span>รายจ่าย</span>
            </div>
          </div>
          <BarsChart data={barsData} />
        </div>

        <div className="card">
          <div className="chart-head">
            <div>
              <h3>หมวดหมู่รายจ่าย</h3>
              <div style={{fontSize:12, color:"var(--muted)", marginTop:2}}>Top 6 หมวด</div>
            </div>
          </div>
          {expByCat.length === 0 ? (
            <div className="empty"><div className="ico"><Icon.Inbox /></div>ยังไม่มีรายจ่าย</div>
          ) : (
            <div className="donut-wrap">
              <Donut data={expByCat} />
              <div className="donut-list">
                {expByCat.map((d, i) => (
                  <div className="row" key={i}>
                    <span className="label"><span className="dot" style={{background:d.color, width:10, height:10, borderRadius:3, display:"inline-block"}}></span>{d.label}</span>
                    <span className="val">฿{fmtMoney(d.value, 0)}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>

      <div className="card">
        <div className="chart-head">
          <div>
            <h3>รายการล่าสุด</h3>
            <div style={{fontSize:12, color:"var(--muted)", marginTop:2}}>6 รายการล่าสุด</div>
          </div>
          <button className="btn ghost" onClick={() => onNav("list")}>ดูทั้งหมด →</button>
        </div>
        <div className="recent">
          {recent.map(t => (
            <div className="row" key={t.id}>
              <div className={`icon-bub ${t.type === "income" ? "in" : "out"}`}>
                {t.type === "income" ? <Icon.ArrowDown width="16" height="16"/> : <Icon.ArrowUp width="16" height="16"/>}
              </div>
              <div className="meta">
                <div className="t1">{t.item}</div>
                <div className="t2">{t.doc} · {catLabel(t.category)} · {fmtDate(t.date)}</div>
              </div>
              <div className={`amt ${t.type === "income" ? "in" : "out"}`}>
                {t.type === "income" ? "+" : "−"}฿{fmtMoney(t.amount, 2)}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function exportCSV(rows) {
  const header = ["วันที่","เลขที่เอกสาร","ประเภท","รายการ","หมวดหมู่","การชำระ","ผู้บันทึก","หมายเหตุ","จำนวนเงิน"];
  const body = rows.map(t => [
    fmtDate(t.date), t.doc, t.type === "income" ? "รายรับ" : "รายจ่าย",
    t.item, catLabel(t.category), payLabel(t.payment), userName(t.user),
    t.note || "", (t.type === "income" ? "" : "-") + t.amount.toFixed(2)
  ]);
  const csv = [header, ...body].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob(["﻿" + csv], {type: "text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `rainy-minimart-${Date.now()}.csv`; a.click();
  URL.revokeObjectURL(url);
}

function App() {
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [period, setPeriod] = useState("month");
  const [entryKind, setEntryKind] = useState("income");
  const [txs, setTxs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [toasts, setToasts] = useState([]);
  const [confirm, setConfirm] = useState({ open: false });

  useEffect(() => {
    if (user) {
      setLoading(true);
      window.fetchTransactions().then(data => {
        setTxs((data || []).map(t => ({ ...t, date: new Date(t.date) })));
        setLoading(false);
      }).catch(err => {
        console.error('Failed to fetch transactions:', err);
        pushToast("ไม่สามารถโหลดรายการได้", "error");
        setLoading(false);
      });
    }
  }, [user]);

  const pushToast = (msg, kind = "success") => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, msg, kind }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2800);
  };

  const handleLogin = (u) => { setUser(u); pushToast(`ยินดีต้อนรับ คุณ${u.name}`, "success"); };
  const handleLogout = () => {
    setConfirm({
      open: true, title: "ออกจากระบบ", body: "คุณต้องการออกจากระบบหรือไม่?", confirmLabel: "ออกจากระบบ",
      onConfirm: () => { setUser(null); setPage("dashboard"); setConfirm({ open: false }); },
    });
  };
  const handleSave = (tx) => {
    const userData = USERS.find(u => u.id === tx.user);
    const apiTx = {
      id: tx.id,
      type: tx.type,
      date: tx.date.toISOString().split('T')[0],
      doc: tx.doc,
      item: tx.item,
      category: tx.category,
      amount: tx.amount,
      payment: tx.payment,
      user_id: tx.user,
      user_name: userData?.name || tx.user,
      note: tx.note,
    };
    window.createTransaction(apiTx).then(() => {
      setTxs(prev => [tx, ...prev].sort((a,b) => b.date - a.date));
      pushToast(`บันทึก${tx.type === "income" ? "รายรับ" : "รายจ่าย"} ${tx.doc} สำเร็จ`, "success");
    }).catch(err => {
      console.error('Failed to save transaction:', err);
      pushToast("ไม่สามารถบันทึกรายการได้", "error");
    });
  };
  const handleDelete = (id) => {
    setConfirm({
      open: true, title: "ลบรายการ", body: "ต้องการลบรายการนี้ใช่หรือไม่? การลบไม่สามารถกู้คืนได้", confirmLabel: "ลบ",
      onConfirm: () => {
        window.deleteTransaction(id).then(() => {
          setTxs(prev => prev.filter(t => t.id !== id));
          pushToast("ลบรายการสำเร็จ", "success");
          setConfirm({ open: false });
        }).catch(err => {
          console.error('Failed to delete transaction:', err);
          pushToast("ไม่สามารถลบรายการได้", "error");
        });
      },
    });
  };

  if (!user) {
    return (<><LoginScreen onLogin={handleLogin} /><ToastStack toasts={toasts} /></>);
  }

  let content;
  if (page === "dashboard") content = <Dashboard txs={txs} onNav={setPage} period={period} setPeriod={setPeriod} />;
  else if (page === "income") content = <EntryScreen kind="income" setKind={(k) => { setEntryKind(k); setPage(k); }} currentUser={user} onSave={handleSave} txs={txs} />;
  else if (page === "expense") content = <EntryScreen kind="expense" setKind={(k) => { setEntryKind(k); setPage(k); }} currentUser={user} onSave={handleSave} txs={txs} />;
  else if (page === "list") content = <ListScreen txs={txs} onDelete={handleDelete} currentUser={user} />;
  else if (page === "report") content = <ReportScreen txs={txs} />;
  else if (page === "users") content = <UsersScreen users={USERS} />;
  else if (page === "settings") content = <SettingsScreen />;

  return (
    <>
      <div className="app">
        <Sidebar current={page} onNav={setPage} user={user} onLogout={handleLogout} role={user.role} />
        <main className="main" key={page}>{content}</main>
      </div>
      <ToastStack toasts={toasts} />
      <Confirm {...confirm} onCancel={() => setConfirm({ open: false })} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
